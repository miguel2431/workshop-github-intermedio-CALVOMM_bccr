name: Matrix Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  test-matrix:
    name: .NET ${{ matrix.dotnet-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      # Si una combinación falla, las demás siguen corriendo
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        dotnet-version: ['8.0.x', '9.0.x']
        exclude:
          # .NET 8 es LTS pero no necesitamos todas las combinaciones; excluimos Windows para ahorrar minutos
          - os: windows-latest
            dotnet-version: '8.0.x'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore dependencias
        run: dotnet restore

      - name: Compilar
        run: dotnet build --configuration Release --no-restore

      - name: Ejecutar pruebas
        run: dotnet test --configuration Release --no-restore --collect:"XPlat Code Coverage" --results-directory ./coverage --logger "trx;LogFileName=test-results.trx"

      - name: Subir resultado por combinación
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-dotnet${{ matrix.dotnet-version }}-${{ matrix.os }}
          path: |
            coverage/
          retention-days: 3
          if-no-files-found: ignore
